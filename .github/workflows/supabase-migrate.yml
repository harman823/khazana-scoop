name: Supabase Migrations

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment to deploy migrations against
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

jobs:
  migrate:
    name: Deploy Prisma migrations to Supabase
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DIRECT_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Deploy migrations
        run: pnpm db:deploy
